<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion風メモ帳</title>
  <meta name="description" content="LocalStorageに保存されるシンプルなメモ帳">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">N</div>
          <span>My Workspace</span>
        </div>
      </div>
      <div class="sidebar-content">
        <div class="sidebar-section">
          <div class="section-title">Private</div>
          <ul id="memoList" class="memo-list">
            <!-- Memos go here -->
          </ul>
        </div>
        <button class="button-add-memo" id="newMemoBtn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 1.16663V12.8333" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1.16699 7H12.8337" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          New page
        </button>
      </div>
    </aside>

    <main class="main-content">
      <div class="top-nav">
        <div id="currentMemoBreadcrumb" class="breadcrumb">Untitled</div>
        <div class="nav-actions">
          <span id="saveStatus" class="status-text">Saved to LocalStorage</span>
          <button class="button-ghost" id="deleteBtn">Delete</button>
        </div>
      </div>
      <div class="editor-container">
        <input type="text" id="memoTitle" class="memo-title" placeholder="Untitled" autocomplete="off">
        <div class="editor-toolbar">
          <button class="toolbar-btn" data-command="bold" title="Bold (Ctrl+B)"><b>B</b></button>
          <button class="toolbar-btn" data-command="italic" title="Italic (Ctrl+I)"><i>I</i></button>
          <div class="toolbar-separator"></div>
          <button class="toolbar-btn" id="addImageBtn" title="Add Image">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M2 3C1.44772 3 1 3.44772 1 4V12C1 12.5523 1.44772 13 2 13H14C14.5523 13 15 12.5523 15 12V4C15 3.44772 14.5523 3 14 3H2ZM0 4C0 2.89543 0.89543 2 2 2H14C15.1046 2 16 2.89543 16 4V12C16 13.1046 15.1046 14 14 14H2C0.89543 14 0 13.1046 0 12V4ZM4 5.5C4 4.67157 4.67157 4 5.5 4C6.32843 4 7 4.67157 7 5.5C7 6.32843 6.32843 7 5.5 7C4.67157 7 4 6.32843 4 5.5ZM1.5 11.5L5.5 6.5L8.5 10L10.5 8L14.5 12.5H1.5Z" fill-rule="evenodd" clip-rule="evenodd"/>
            </svg>
          </button>
          <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>
        <div id="memoContent" class="memo-content" contenteditable="true" data-placeholder="Start typing..."></div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
